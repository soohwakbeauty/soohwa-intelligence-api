<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Soohwa API Test</title>
</head>

<body>

<input type="file" id="photo" accept="image/*">
<br><br>

<button id="test">
Tester OpenAI avec photo
</button>

<pre id="result"></pre>

<script>
let selectedPhoto = null;

document.getElementById("photo").addEventListener("change", function () {
  const file = this.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = function (event) {
    selectedPhoto = event.target.result;
  };

  reader.readAsDataURL(file);
});

document.getElementById("test").onclick = async () => {
  document.getElementById("result").textContent = "Analyse en cours...";

  const payload = {
    questionnaire: {
      skin: "mixte",
      concern: "rougeurs",
      hydration: "moyenne",
      sensitivity: "modérée",
      intensity: "moyenne",
      age: "25-34"
    },

    photo: {
      provided: !!selectedPhoto,
      base64: selectedPhoto,
      quality: "unknown"
    }
  };

  const res = await fetch(
    "https://soohwa-intelligence-api.vercel.app/api/analyze",
    {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    }
  );

  const json = await res.json();

  document.getElementById("result").textContent =
    JSON.stringify(json, null, 2);
};
</script>

</body>
</html>
